<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">

    <style>
        .myBody {
            height: 100vh;
            display: grid;
            place-items: center;
        }

    </style>
</head>
<body class="container bg-info myBody" onload="getPlayerNames()">
   
    <main class="row bg-light myMain border-2">
        <h1 class="text-uppercase text-center bg-warning p-2 mb-5">Roll the dice</h1>
        <div id="instruction" class="text-center fs-4 mb-4"></div>

        <div id="playerOne" class="border-end col-6 text-center">
            <h2 class="mb-4">Player 1</h2>
            <button class="button btn btn-primary p-2">Roll the dice</button>
            <div class="points  fs-4 mt-3 fw-bold"></div>
            <div class="result my-3"></div>

        </div>

        <div id="playerTwo" class="col-6 text-center">
            <h2 class="mb-4">Player 2</h2>
            <button class="button btn btn-primary p-2">Roll the dice</button>
            <div class="points fs-4 mt-3  fw-bold"></div>
            <div class="result my-3"></div>

        </div>
    </main>

    <script>

        let player1;
        let player2;

        // get the player Names
        function getPlayerNames(){
            player1 = prompt("Player 1 - please type in your name");
            player2 = prompt("Player 2 - please type in your name");

            // put player's name on each part of the desktop
            document.querySelector("#playerOne h2").innerHTML = player1;
            document.querySelector("#playerTwo h2").innerHTML = player2;

            document.getElementById("instruction").innerHTML = player1 + ", please start with clicking the button!";
        }

        
        let result1, result2; 

        document.getElementsByClassName("button")[0].addEventListener("click", function(){
            // function for rolling the dice
            result1 = Math.floor(Math.random() * 6 + 1);

            document.getElementsByClassName("points")[0].innerHTML = result1;
            document.getElementById("instruction").innerHTML = player2 + ", it's your turn now!";
        });
        

        document.getElementsByClassName("button")[1].addEventListener("click", function(){
            // function for rolling the dice

            result2 = Math.floor(Math.random() * 6 + 1);

            document.getElementsByClassName("points")[1].innerHTML = result2;
            document.getElementById("instruction").innerHTML = "";

            if (result1 > result2) {
                document.getElementsByClassName("result")[0].innerHTML = "You win";
                document.getElementsByClassName("result")[1].innerHTML = "You lose";
                document.getElementsByClassName("result")[0].classList.add("bg-success", "text-white");
                document.getElementsByClassName("result")[1].classList.add("bg-danger", "text-white");
            } else if (result1 < result2) {
                document.getElementsByClassName("result")[1].innerHTML = "You win";
                document.getElementsByClassName("result")[0].innerHTML = "You lose";
                document.getElementsByClassName("result")[1].classList.add("bg-success", "text-white");
                document.getElementsByClassName("result")[0].classList.add("bg-danger", "text-white");
            } else if (result1 = result2) {
                document.getElementsByClassName("result")[0].innerHTML = "You are equal";
                document.getElementsByClassName("result")[1].innerHTML = "You are equal";
                document.getElementsByClassName("result")[0].classList.add("bg-warning", "text-white");
                document.getElementsByClassName("result")[1].classList.add("bg-warning", "text-white");
            }

            document.getElementById("instruction").innerHTML = "please reload the page"
        });
        
    </script>

    <!-- ! Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous"></script>
</body>
</html>
