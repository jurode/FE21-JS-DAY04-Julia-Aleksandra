<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic 2</title>
</head>
<body>

    <h1>Basic Exercise 2</h1>
    
    <!-- Extend the previous form to have a select option, where your profession can be selected. If you are working in IT, the background of the div displaying the information from the form will turn purple, if you work in hospitality, your div will turn yellow, etc. 
    (Hint: extracting the selection value will work similarly to extracting the input values) -->

    <label for="">First Name: </label><input type="text" id="firstName"><br>
        <label for="">Last Name: </label><input type="text" id="lastName"><br>
        <label for="">Age: </label><input type="number" id="age"><br>
        <label for="">Profession: </label>
        <select name="profession" id="profession">
            <option value="IT">IT</option>
            <option value="hospitality">Hospitality</option>
        </select><br>
        <button type="submit" id="submitBtn">Submit</button>

    <div id="output"></div>


    <script>

        document.getElementById("submitBtn").addEventListener("click", function(){

            let output =  document.getElementById("output");
            // console.log(output);

            let firstName = document.getElementById("firstName").value;
            let lastName = document.getElementById("lastName").value;
            let age = document.getElementById("age").value;
            let profession = document.getElementById("profession").value;
            
            var myInput = `${firstName} ${lastName}, ${age} years old.`;
            
            document.getElementById("output").innerHTML = myInput;
            
            // console.log(profession);
            // console.log(firstName);
            // console.log(myInput);

            let nameLength = firstName.length + lastName.length;
            if (nameLength > 5) {
                output.style.color = "blue";
            } else if (nameLength <= 5){
                output.style.color = "red";
            }
            // console.log(nameLength);


            let profession1 = document.querySelector("#profession option:nth-of-type(1)").value;
            let profession2 = document.querySelector("#profession option:nth-of-type(2)").value;
            
            if (profession == profession1) {
                output.style.backgroundColor = "purple";
            } else if (profession == profession2) {
                output.style.backgroundColor = "yellow";
            }
            
        });
        

    </script>
</body>
</html>
